<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">

    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css" class="theme-css">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/prismjs/themes/prism.min.css" />

    <title>管理员手册</title>
</head>

<body>
    <div id="app">文档加载中...</div>

    <script>
        window.$docsify = {
            repo: "https://github.com/ShengXiaLio/ShengXiaLio.github.io",
            loadNavbar: false,
            loadSidebar: true,
            subMaxLevel: 3,
            auto2top: true,
            coverpage: "coverpage.md",
            alias: {
                "/_sidebar.md": "/sidebar.md"
            },
            name: "管理员手册",
            mergeNavbar: true,
            onlyCover: true,
            search: {
                namespace: "zh-cn"
            },
            pagination: {
                crossChapter: true,
                crossChapterText: true,
            },
            hideCode: {
                scroll: false,
                height: 300
            }
        }
    </script>

    <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-plugin-flexible-alerts/dist/docsify-plugin-flexible-alerts.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-beian@latest/dist/beian.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-hide-code/dist/docsify-hide-code.min.js"></script>


    <script>
        var repoPath = 'ShengXiaLio/ShengXiaLio.github.io'; 

        fetch(`https://api.github.com/repos/${repoPath}/commits?per_page=1`)
          .then(response => response.json())
          .then(data => {
            var commit = data[0];
            var commitTime = new Date(commit.commit.author.date);
            var lastUpdated = document.createElement('div');
            var updatedBy = document.createElement('div');

            lastUpdated.id = 'lastUpdated';
            updatedBy.id = 'updatedBy';

            lastUpdated.textContent = `最后更新时间: ${commitTime.toLocaleString()}`;
            updatedBy.textContent = `更新者: ${commit.commit.author.name}`;

            document.body.appendChild(lastUpdated);
            document.body.appendChild(updatedBy);
          })
          .catch(error => console.error('加载提交信息失败:', error));
    </script>
</body>

</html>
